name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Configure private repo access
        shell: bash
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: linux

      - run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Stage artifact
        run: |
          mkdir -p staging
          cp target/x86_64-unknown-linux-gnu/release/libgodot_vim.so staging/
          sha256sum staging/libgodot_vim.so | awk '{print $1 "  libgodot_vim.so"}' > staging/libgodot_vim.so.sha256

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: libgodot_vim.so
          path: staging/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Configure private repo access
        shell: bash
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: windows

      - run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          cp target/x86_64-pc-windows-msvc/release/godot_vim.dll staging/
          sha256sum staging/godot_vim.dll | awk '{print $1 "  godot_vim.dll"}' > staging/godot_vim.dll.sha256

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: godot_vim.dll
          path: staging/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Configure private repo access
        shell: bash
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: macos

      - name: Build ARM64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/libgodot_vim.dylib \
            target/x86_64-apple-darwin/release/libgodot_vim.dylib \
            -output libgodot_vim.dylib

      - name: Stage artifact
        run: |
          mkdir -p staging
          cp libgodot_vim.dylib staging/
          shasum -a 256 staging/libgodot_vim.dylib > staging/libgodot_vim.dylib.sha256

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: libgodot_vim.dylib
          path: staging/*

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure private repo access
        shell: bash
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Assemble addon
        run: |
          mkdir -p addons/godot_vim/bin
          cp artifacts/libgodot_vim.so addons/godot_vim/bin/
          cp artifacts/godot_vim.dll addons/godot_vim/bin/
          cp artifacts/libgodot_vim.dylib addons/godot_vim/bin/

      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2  # v5.0.0
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          request_rate: 4
          files: |
            addons/godot_vim/bin/libgodot_vim.so
            addons/godot_vim/bin/godot_vim.dll
            addons/godot_vim/bin/libgodot_vim.dylib

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: 'addons/godot_vim/bin/*'

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --format json --override-filename godot-vim-sbom.cdx

      - name: Generate release body
        id: body
        env:
          VERSION: ${{ inputs.version }}
          VT_ANALYSIS: ${{ steps.vt.outputs.analysis }}
        run: |
          set -eu

          PREV_TAG=$(git tag --list "v*" --sort=-version:refname | grep -vFx "$VERSION" | head -1 || true)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          {
            echo 'RELEASE_BODY<<BODYEOF'

            if [ -n "${VT_ANALYSIS:-}" ]; then
              echo "## VirusTotal Scan"
              echo ""
              IFS=',' read -ra ENTRIES <<< "$VT_ANALYSIS"
              for entry in "${ENTRIES[@]}"; do
                filename="${entry%%=*}"
                url="${entry#*=}"
                echo "- [\`${filename}\`](${url})"
              done
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/hmdfrds/godot-vim/compare/${PREV_TAG}...${VERSION}"
            echo 'BODYEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create addon zip
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Wrap addons in a version-named folder so Godot Asset Library's
          # "Ignore asset root" (default checked) strips the wrapper and
          # correctly places addons/ at the project root.
          STAGE="godot-vim-${VERSION}"
          mkdir -p "$STAGE"
          cp -r addons "$STAGE/"
          cp LICENSE "$STAGE/"
          cp README.md "$STAGE/"
          zip -r "godot-vim-${VERSION}.zip" "$STAGE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          draft: true
          tag_name: ${{ inputs.version }}
          name: GodotVim ${{ inputs.version }}
          body: ${{ steps.body.outputs.RELEASE_BODY }}
          files: |
            godot-vim-${{ inputs.version }}.zip
            addons/godot_vim/bin/libgodot_vim.so
            addons/godot_vim/bin/godot_vim.dll
            addons/godot_vim/bin/libgodot_vim.dylib
            artifacts/libgodot_vim.so.sha256
            artifacts/godot_vim.dll.sha256
            artifacts/libgodot_vim.dylib.sha256
            godot-vim-sbom.cdx.json
